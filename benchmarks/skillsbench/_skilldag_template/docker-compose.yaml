services:
  main:
    build:
      context: ${CONTEXT_DIR:-.}
    image: ${MAIN_IMAGE_NAME:-hb-skilldag-task}
    network_mode: ${NETWORK_MODE:-bridge}
    command:
      - /bin/bash
      - -lc
      - |
        set -e
        # Keep native agent skill roots empty; SkillDAG skills are exposed only
        # through the `skilldag` CLI and its mounted runtime paths.
        rm -rf \
          /root/.claude/skills \
          /root/.codex/skills \
          /root/.opencode/skill \
          /root/.opencode/skills \
          /root/.goose/skills \
          /root/.factory/skills \
          /root/.agents/skills \
          /root/.gemini/skills \
          /root/.github/skills \
          /root/.terminus/skills \
          /root/.cursor/skills \
          /root/skills \
          /root/environment/skills
        find /root/verifier-skills -name SKILL.md -type f -delete 2>/dev/null || true
        exec sleep infinity
    environment:
      - TEST_DIR=${TEST_DIR}
      - SKILLDAG_SKILLS_DIR=/var/lib/skilldag/bodies
      - SKILLDAG_GRAPH_PATH=/var/lib/skilldag/runtime/skillgraph.json
      - SKILLDAG_EMBEDDING_MODEL
      - SKILLDAG_EMBEDDING_DIM
      - SKILLDAG_RETRIEVAL_TOP_N
      - SKILLDAG_EMBEDDING_API_KEY
      - SKILLDAG_EMBEDDING_BASE
      - OPENAI_API_KEY
      - OPENAI_BASE_URL
    volumes:
      - ${HOST_VERIFIER_LOGS_PATH}:${ENV_VERIFIER_LOGS_PATH}
      - ${HOST_AGENT_LOGS_PATH}:${ENV_AGENT_LOGS_PATH}
      - ${SKILLDAG_HOST_RUNTIME:-./skilldag}:/var/lib/skilldag/runtime
      - ${SKILLDAG_HOST_SKILLS:-../../../../data/skillsets/skills_200}:/var/lib/skilldag/bodies:ro
      - ${SKILLDAG_PACKAGE_ROOT:-../../../../../SkillDAG}:/opt/skilldag/package:ro
    deploy:
      resources:
        limits:
          cpus: ${CPUS:-2}
          memory: ${MEMORY:-4g}
